<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@fthshnn0</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>

    <div class="container" style="position:relative;">
        <!-- Theme Toggle Top Right -->
        <div style="position:absolute; top:0; right:0;">
            <button id="themeToggle" class="btn-icon theme-toggle" tabindex="-1">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>

        <header>
            <h1><i class="fa-solid fa-shapes"></i> Fatih Shine @fthshnn0</h1>
            <p>Matbaa için Etiket fire hesap</p>
            <!-- Moved About Trigger Here -->

        </header>

        <main>
            <div class="input-section glass-panel">
                <div class="form-group">
                    <label for="totalSlots"><i class="fa-solid fa-table-cells"></i> Bıçak Sayısı (Göz)</label>
                    <input type="number" id="totalSlots" placeholder="Örn: 18" min="1" value="18">
                </div>

                <div class="sizes-section">
                    <div class="section-header">
                        <label><i class="fa-solid fa-tags"></i> Bedenler ve Adetler</label>
                        <button id="addSizeBtn" class="btn-icon" tabindex="-1"><i class="fa-solid fa-plus"></i></button>
                    </div>

                    <div id="sizesList" class="sizes-list">
                        <!-- Dynamic rows will be added here -->
                    </div>
                    <div style="margin-top: 1rem; text-align: right; color: var(--text-dim); font-size: 0.9rem;">
                        Toplam Adet: <strong id="totalQtyDisplay"
                            style="color: var(--text-light); font-size: 1.1rem;">0</strong>
                    </div>
                </div>

                <button id="calculateBtn" class="btn-primary" tabindex="-1">
                    <i class="fa-solid fa-calculator"></i> Hesapla
                </button>

                <button id="pdfOpsBtn" class="btn-secondary" style="margin-top: 1rem;" tabindex="-1">
                    <i class="fa-solid fa-file-pdf"></i> PDF İşlemleri
                </button>

                <!-- NEW PDF Section -->
                <div id="pdfOpsSection" class="hidden" style="margin-top: 1.5rem;">
                    <div class="section-divider">
                        <span>PDF İŞLEMLERİ</span>
                    </div>

                    <div id="pdfDropZone" class="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"
                            style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--secondary-color);"></i>
                        <p>PDF Dosyasını Sürükleyip Bırakın</p>
                        <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 0.25rem;">veya Seçmek İçin
                            Tıklayın (Kopyala/Yapıştır da desteklenir)</p>
                        <input type="file" id="pdfFileInput" accept="application/pdf" hidden>
                        <div id="pdfFileInfo"
                            style="margin-top: 1rem; font-weight: 500; color: var(--success); display: none;"></div>
                    </div>

                    <button id="splitPdfBtn" class="btn-secondary btn-action" style="margin-top: 1rem;" disabled>
                        <i class="fa-solid fa-scissors"></i> PDF Böl
                    </button>
                </div>
            </div>

            <div id="resultsSection" class="results-section hidden">
                <div class="section-divider">
                    <span>SONUÇLAR</span>
                    <button id="exportBtn" class="btn-icon" tabindex="-1"
                        style="margin-left:auto; width:auto; padding:0 1rem; gap:0.5rem; display:none;">
                        <i class="fa-solid fa-file-excel"></i> Excel İndir
                    </button>
                </div>
                <div id="resultsContainer" class="results-grid">
                    <!-- Result cards will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Template for a size row -->
    <template id="sizeRowTemplate">
        <div class="size-row fade-in">
            <input type="text" class="size-name" placeholder="Beden (S, M...)" required>
            <input type="number" class="size-qty" placeholder="Adet" min="1" required>
            <button class="btn-delete remove-row" tabindex="-1"><i class="fa-solid fa-trash"></i></button>
        </div>
    </template>



    <script src="script.js"></script>
</body>

</html>
